<!-- page1_chatbot.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Summary - 챗봇</title>
    <!-- style -->
    <link rel="stylesheet" href="/static/css/page1_chatbot.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <img src="/static/esg_summ_logo.png" alt="ESG Summary Logo" class="logo">
            <nav class="top-nav">
                <a href="/chatbot" class="nav-link active">Page1</a>
                <span class="nav-separator">|</span>
                <a href="/rawdb" class="nav-link">Page2</a>
                <span class="nav-separator">|</span>
                <a href="/db" class="nav-link">Page3</a>
                <span class="nav-separator">|</span>
                <a href="/rag" class="nav-link">Page4</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="greeting">안녕하세요 ! <span id="userNameDisplay">ㅇㅇㅇ</span>님 !</div>
                <div class="timer-wrapper">
                    <span class="token-timer" id="tokenTimer">--:--:--</span>
                    <button class="logout-btn" id="logoutBtn">로그아웃</button>
                </div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">장기 메모리 설정 되지 않은 간단한 챗봇 데모<br/>최근 3쌍의 대화 내역을 기반으로 답변 생성 </div>
                <div class="model-name">LLM 모델: claude-haiku-4-5-20251001</div>
                <br/>
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span>
                    <span>새 채팅</span>
                </button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <!-- Conversations will be loaded here -->
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="messages-wrapper" id="messagesWrapper">
                    <div class="empty-state">
                        <h2>새로운 대화를 시작하세요</h2>
                        <p>메시지를 입력하여 AI와 대화를 시작할 수 있습니다</p>
                        <p>입력을 전달받으면 자동으로 새 채팅 항목이 생성됩니다</p>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="메시지를 입력하세요..." 
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">전송</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for editing conversation title -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title">채팅 제목 수정</div>
            <input type="text" class="modal-input" id="editTitleInput" placeholder="새 제목을 입력하세요">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="cancelEditBtn">취소</button>
                <button class="modal-btn confirm" id="confirmEditBtn">확인</button>
            </div>
        </div>
    </div>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.4.js" integrity="sha256-a9jBBRygX1Bh5lt8GZjXDzyOB+bWve9EiO7tROUtj/E=" crossorigin="anonymous"></script>
    <script src="/static/js/page1_chatbot.js"></script>
</body>
</html>
