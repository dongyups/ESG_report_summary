<!-- page0_login.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Summary - 로그인</title>
    <!-- style -->
    <link rel="stylesheet" href="/static/css/page0_login.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <img src="/static/esg_summ_logo.png" alt="ESG Summary Logo" class="logo">
        <div class="greeting">안녕하세요!</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="login-container">
            <h1 class="login-title">로그인</h1>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        autocomplete="username"
                        placeholder="아이디를 입력하세요"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        autocomplete="current-password"
                        placeholder="비밀번호를 입력하세요"
                    >
                </div>
                
                <button type="submit" class="login-button" id="loginButton">
                    로그인
                </button>
                
                <div class="form-links">
                    <a href="">회원가입 진행</a>
                    <a href="">비밀번호 찾기</a>
                </div>
            </form>
        </div>
    </div>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.4.js" integrity="sha256-a9jBBRygX1Bh5lt8GZjXDzyOB+bWve9EiO7tROUtj/E=" crossorigin="anonymous"></script>
    <script src="/static/js/page0_login.js"></script>
</body>
</html>
