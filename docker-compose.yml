services:

  mysql80:
    image: mysql:8.0
    # (optional) mysql은 컨테이너 이름 설정 불필요
    container_name: mysql80
    networks:
      - esg_local_net
    volumes:
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/data:/var/lib/mysql
      - ./db/initdb.d:/docker-entrypoint-initdb.d
    # AWS 서버의 절대 경로로 지정
    env_file:
      - /home/ubuntu/env/.env.development
      - /home/ubuntu/env/.env.production
    ports:
      - "3306:3306"
    restart: always
    # MySQL이 완전히 켜졌는지 확인하는 헬스체크 로직
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s # 처음 컨테이너 생성 시 초기화 시간을 벌어줌

  redis7alpine:
    image: redis:7-alpine
    # (optional) redis는 컨테이너 이름 설정 불필요
    container_name: redis7alpine
    networks:
      - esg_local_net
    restart: always
    # Redis 헬스체크 로직 (선택 사항이지만 권장)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama
    # (필요) 도커 컨테이너 이름 고정해서 bge-m3 모델 설치 exec 실행 (.github\workflows\main.yml)
    container_name: ollama
    networks:
      - esg_local_net
    volumes:
      - ./ollama:/root/.ollama
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # AWS 서버의 절대 경로로 지정
    env_file:
      - /home/ubuntu/env/.env.development
      - /home/ubuntu/env/.env.production
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/code/datasets
      - ./chroma_db:/code/chroma_db
    # DB와 Redis가 'healthy' 상태가 될 때까지 대기
    depends_on:
      mysql80:
        condition: service_healthy
      redis7alpine:
        condition: service_healthy
      ollama:
        condition: service_started # ollama는 헬스체크 없이 켜지면 바로 진행
    restart: always
    networks:
      - esg_local_net

networks:
  esg_local_net:
    driver: bridge
